# Static-analysis configuration for Notinotes.
# See context/code-standards.md "Dart and analyzer" for rationale.

include: package:flutter_lints/flutter.yaml

analyzer:
  plugins:
    - custom_lint
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Promote a few warnings to errors so CI fails on them.
    avoid_print: error
    unawaited_futures: error
    always_declare_return_types: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
    - "build/**"
    - "ios/Pods/**"
    - "android/**/build/**"

linter:
  rules:
    # Const correctness — cheaper rebuilds, smaller bundles.
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true

    # Hygiene
    avoid_print: true
    unawaited_futures: true
    always_declare_return_types: true

    # Style consistency
    prefer_single_quotes: true
    require_trailing_commas: true

# Configure dart format line length.
formatter:
  page_width: 100

custom_lint:
  rules:
    - forbidden_import
    - no_hardcoded_color
    - hardcoded_text_in_widget
